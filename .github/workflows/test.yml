name: sparta-mapper CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -e .

      - name: Lint
        run: flake8 src/ tests/ --max-line-length=100 --extend-ignore=E203

      - name: Run unit tests
        run: pytest tests/ -v

      # Vulnerability scan on dependencies - relevant given the project's
      # own security positioning. Non-blocking for now (|| true) since
      # this is an early-stage repo; tighten once dependencies stabilize.
      - name: Dependency vulnerability scan
        run: |
          pip install pip-audit
          pip-audit -r requirements.txt || true
